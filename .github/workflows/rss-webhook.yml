name: RSS Feed Webhook

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch RSS and send to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RSS_RECENT_LOOKBACK_COUNT: ${{ vars['RSS_RECENT_LOOKBACK_COUNT'] }}
          RSS_IMAGE_FETCH_RETRIES: ${{ vars['RSS_IMAGE_FETCH_RETRIES'] }}
          RSS_IMAGE_SUCCESS_TTL_HOURS: ${{ vars['RSS_IMAGE_SUCCESS_TTL_HOURS'] }}
          RSS_IMAGE_MISS_TTL_MINUTES: ${{ vars['RSS_IMAGE_MISS_TTL_MINUTES'] }}
        run: node ./src/webhookRssRunner.js

      - name: Commit updated RSS timestamps
        run: |
          if git diff --quiet -- data/rssFeedTimestamps.json; then
            echo "No timestamp changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rssFeedTimestamps.json
          git commit -m "chore: update RSS feed timestamps"
          git push